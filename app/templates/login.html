{% extends "base.html" %}

{% block title %}Sign in &mdash; Dungeon Master{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="/static/css/auth.css" />
{% endblock %}

{% block body_class %}auth-screen{% endblock %}

{% block content %}
<div class="auth-shell">
  <section class="auth-card" data-cap="SIGN IN" aria-labelledby="login-title">
    <h1 id="login-title">Welcome back</h1>
    <p class="blurb">Pick up the lantern. The table awaits.</p>

    <form id="login-form" class="auth-form" autocomplete="on">
      <label>
        Username
        <input type="text" name="username" required autocomplete="username" autofocus />
      </label>
      <label>
        Password
        <input type="password" name="password" required autocomplete="current-password" />
      </label>
      <button type="submit">Sign in</button>
      <p class="auth-error" id="login-error" hidden role="status"></p>
    </form>

    <p class="auth-aside">
      No account yet? <a href="/register">Register</a>
    </p>
  </section>
</div>

<script>
  document.getElementById("login-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const form = event.currentTarget;
    const error = document.getElementById("login-error");
    const submit = form.querySelector("button[type=submit]");
    error.hidden = true;
    submit.disabled = true;
    try {
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: form.username.value,
          password: form.password.value,
        }),
      });
      if (response.ok) {
        window.location.assign("/dashboard");
        return;
      }
      const detail = (await response.json().catch(() => ({}))).detail || "Sign-in failed.";
      error.textContent = detail;
      error.hidden = false;
    } catch (err) {
      error.textContent = "Network error — please try again.";
      error.hidden = false;
    } finally {
      submit.disabled = false;
    }
  });
</script>
{% endblock %}
