  description: >
    Picklocks, second-storey workers, scouts, and ne'er-do-wells. The
    thief brings the tools of the underworld to the dungeon: lockpicks,
    grease, soft boots, and the patience to wait for the right moment.
    They wear leather, never a shield, and prefer to win fights they
    finish before the opponent knows one started.
