  description: >
    Disciplined warriors who train in every weapon and every armour the
    smiths can forge. Fighters carry the line — they can use any sword,
    axe, polearm, or bow, and they wear plate as easily as a cloak. They
    have no spells and no skills beyond their craft, but the craft is
    survival.

