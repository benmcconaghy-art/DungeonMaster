  description: >
    Holy warriors and healers — clerics serve a deity or a cause and
    receive their spells through prayer rather than study. They wear
    any armour, fight with blunt weapons (no edge, by tradition), and
    can repel undead by brandishing a holy symbol. Where the fighter
    holds the line and the magic-user breaks it, the cleric keeps the
    party alive long enough for either to matter.

