# Basic Fantasy RPG core classes — Fighter, Cleric, Magic-User, Thief.
# Mechanics conform to BFRPG 4th edition (CC BY-SA, Basic Fantasy Project).
# Saves are target numbers on d20: roll the listed value or higher to succeed.
# attack_bonus_progression is added to the d20 attack roll under ascending AC.
# xp_progression is the cumulative XP required to reach the listed level.

