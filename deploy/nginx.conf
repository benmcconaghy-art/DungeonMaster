upstream dm_app {
    server 127.0.0.1:8001;
}

server {
    listen 443 ssl http2;
    server_name dm.mcconaghygroup.internal;

    ssl_certificate     /etc/pki/tls/certs/dm.crt;
    ssl_certificate_key /etc/pki/tls/private/dm.key;

    client_max_body_size 10m;

    location /ws/ {
        proxy_pass http://dm_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /static/ {
        alias /opt/dungeon-master/app/static/;
        expires 7d;
        access_log off;
    }

    # Authenticated image delivery: FastAPI checks campaign membership and
    # responds with X-Accel-Redirect: /images/<uuid>.png; nginx serves the
    # file directly. The location is `internal` so it cannot be requested
    # without the redirect header.
    location /images/ {
        internal;
        alias /var/lib/dungeon-master/images/;
    }

    location / {
        proxy_pass http://dm_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Optional: redirect plain HTTP to HTTPS. Trusted-LAN deployment so this is
# a courtesy rather than security; comment out if port 80 is unavailable.
server {
    listen 80;
    server_name dm.mcconaghygroup.internal;
    return 301 https://$host$request_uri;
}
